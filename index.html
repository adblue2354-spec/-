<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>整備解説書ビューワー</title>
<style>
  :root{--bg:#1C1F24;--surface:#252930;--card:#2D3139;--border:#3A404A;
    --amber:#00E5FF;--amber-d:#2E8BA8;--silver:#8A9BA8;--text:#E8ECF0;
    --dim:#6B7785;--danger:#E05252;--green:#4CAF7D;--r:12px;
    --small:#4CAF7D;--medium:#4A9EDB;--large:#E07B39;
    --font:'Hiragino Sans','Noto Sans JP',sans-serif;--mono:'SF Mono','Courier New',monospace}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;font-size:16px}

  /* ヘッダー */
  header{background:var(--surface);border-bottom:2px solid var(--amber);padding:14px 16px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{display:flex;align-items:center;gap:12px}
  header{position:relative;overflow:visible;padding:0;min-height:300px}
  header::after{
    content:'';position:absolute;bottom:-3px;left:0;right:0;height:4px;
    background:linear-gradient(90deg,
      transparent 0%, #00E5FF 20%, #fff 50%, #00E5FF 80%, transparent 100%);
    background-size:200% 100%;
    animation:headerGlow 2.5s linear infinite;
    box-shadow:0 0 16px rgba(0,229,255,.8),0 0 32px rgba(0,229,255,.4)}
  @keyframes headerGlow{
    0%{background-position:200% 0}
    100%{background-position:-200% 0}}
  .header-bg{position:absolute;inset:0;background:#000}
  .header-bg img{width:100%;height:100%;object-fit:contain;object-position:center;opacity:1}
  .header-content{position:relative;z-index:1;padding:14px 16px;
    display:flex;align-items:flex-end;justify-content:flex-end;min-height:300px}
  .photo-list-btn{
    background:linear-gradient(135deg,#C89EFF,#A066CC,#D4AAFF,#C89EFF);
    background-size:300% 300%;
    animation:shine 2s ease infinite;
    color:#111;border:none;border-radius:10px;
    padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;
    flex-shrink:0;align-self:flex-end;
    box-shadow:0 0 10px rgba(180,130,255,.4),0 0 20px rgba(180,130,255,.2)}
  .fault-btn{
    background:linear-gradient(135deg,#00E5FF,#C89EFF,#00E5FF);
    background-size:200% 200%;
    animation:shine 2s ease infinite;
    color:#111;border:none;border-radius:10px;
    padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;
    flex-shrink:0;align-self:flex-end;
    box-shadow:0 0 12px rgba(200,158,255,.6),0 0 24px rgba(0,229,255,.3)}
  .header-btn{
    background:linear-gradient(135deg,#00E5FF,#0099CC,#00E5FF);
    background-size:200% 200%;
    animation:shine 2s ease infinite;
    color:#000;border:none;border-radius:10px;
    padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;
    flex-shrink:0;align-self:flex-end;
    box-shadow:0 0 12px rgba(0,229,255,.6),0 0 24px rgba(0,229,255,.3);
    text-shadow:0 1px 2px rgba(255,255,255,.3)}
  @keyframes shine{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}}

  /* ナビ */
  nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);
    overflow-x:auto;-webkit-overflow-scrolling:touch}
  nav::-webkit-scrollbar{display:none}
  nav button{flex:1;padding:12px 6px;background:none;border:none;
    color:var(--dim);font-size:12px;cursor:pointer;border-bottom:3px solid transparent;
    transition:all .2s;white-space:nowrap}
  nav button.active{color:var(--amber);border-bottom-color:var(--amber);font-weight:700}

  /* メイン */
  main{padding:14px;max-width:640px;margin:0 auto}
  .tab-content{display:none}
  .tab-content.active{display:block}

  /* 車両カード */
  .vehicle-grid{display:flex;flex-direction:column;gap:12px}
  .vehicle-card{background:var(--card);border:2px solid #00E5FF;border-radius:var(--r);overflow:hidden;
    box-shadow:0 0 12px rgba(0,229,255,.4),0 0 24px rgba(0,229,255,.15)}
  .vehicle-card.fav{border-color:#00E5FF}
  .card-head{display:flex;align-items:center;gap:14px;padding:14px;border-bottom:1px solid var(--border);cursor:pointer}
  .thumb{width:140px;height:110px;border-radius:10px;background:var(--border);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:42px;overflow:hidden;
    border:2px solid #00E5FF;
    box-shadow:0 0 10px rgba(0,229,255,.5),0 0 20px rgba(0,229,255,.2)}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .vinfo{flex:1;min-width:0}
  .vname{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#00E5FF;text-shadow:0 0 8px rgba(0,229,255,.5)}
  .vsub{font-size:17px;color:#00E5FF;font-family:var(--mono);margin-top:5px;font-weight:700;text-shadow:0 0 6px rgba(0,229,255,.4)}
  .vmeta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
  .badge{display:none}
  .badge.a{display:inline-block;font-size:14px;padding:4px 12px;border-radius:20px;
    background:linear-gradient(135deg,#0D1F3C,#1A3A5C);
    color:var(--amber);font-weight:700;
    border:1px solid rgba(0,229,255,.6);
    box-shadow:0 0 10px rgba(0,229,255,.4),0 0 20px rgba(0,229,255,.15)}
  .fav-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;opacity:.45;flex-shrink:0}
  .fav-btn.on{opacity:1}
  .doc-list{padding:8px 12px;display:flex;flex-direction:column;gap:7px}
  .doc-item{display:flex;align-items:center;gap:10px;padding:11px 12px;
    background:var(--surface);border-radius:9px;cursor:pointer;
    border:2px solid #00E5FF;
    box-shadow:0 0 10px rgba(0,229,255,.4),0 0 20px rgba(0,229,255,.15);
    position:relative;overflow:hidden}
  .doc-item::after{
    content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent 0%,#00E5FF 20%,#fff 50%,#00E5FF 80%,transparent 100%);
    background-size:200% 100%;
    animation:headerGlow 2.5s linear infinite}
  .doc-item:active{background:var(--border)}
  .doc-name{flex:1;font-size:14px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
  .dot.no{background:var(--dim)}
  .doc-add{margin:2px 0 6px;padding:11px;background:none;border:1.5px dashed var(--border);
    border-radius:9px;color:var(--dim);font-size:13px;cursor:pointer;text-align:center;width:100%}
  .doc-add:active{border-color:var(--amber);color:var(--amber)}

  /* 年式別タブ */
  .year-section{margin-bottom:16px}
  .year-header{display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;background:var(--surface);border-radius:10px;
    margin-bottom:8px;cursor:pointer;
    border:1px solid rgba(0,229,255,.4);
    box-shadow:0 0 8px rgba(0,229,255,.2)}
  .year-label{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
  .year-count{font-size:11px;color:var(--silver);font-family:var(--mono)}
  .year-toggle{color:var(--dim);font-size:13px;transition:transform .2s}
  .year-toggle.open{transform:rotate(90deg)}
  .year-manuals{display:flex;flex-direction:column;gap:7px;padding:0 4px}
  .manual-item{display:flex;align-items:center;gap:10px;padding:11px 12px;
    background:var(--card);border-radius:9px;cursor:pointer;
    border:2px solid #00E5FF;
    box-shadow:0 0 10px rgba(0,229,255,.4),0 0 20px rgba(0,229,255,.15);
    position:relative;overflow:hidden}
  .manual-item::after{
    content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent 0%,#00E5FF 20%,#fff 50%,#00E5FF 80%,transparent 100%);
    background-size:200% 100%;
    animation:headerGlow 2.5s linear infinite}
  .manual-item:active{background:var(--border)}
  .manual-name{flex:1;font-size:14px}
  .add-year-btn{width:100%;padding:11px;background:none;border:1.5px dashed var(--border);
    border-radius:9px;color:var(--dim);font-size:13px;cursor:pointer;text-align:center;margin-top:8px}
  .add-year-btn:active{border-color:var(--amber);color:var(--amber)}
  .size-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-family:var(--mono);font-weight:700}
  .size-tag.small{background:#1A3A2A;color:var(--small)}
  .size-tag.medium{background:#1A2E3A;color:var(--medium)}
  .size-tag.large{background:#3A2A1A;color:var(--large)}

  /* 空状態 */
  .empty{text-align:center;padding:60px 20px;color:var(--dim)}
  .empty-icon{font-size:52px;margin-bottom:16px}
  .empty h3{font-size:17px;color:var(--text);margin-bottom:8px}
  .empty p{font-size:13px;line-height:1.7}
  .loading{text-align:center;padding:60px 20px;color:var(--dim)}
  .spinner{font-size:32px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* モーダル */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);
    display:flex;align-items:flex-end;justify-content:center;
    z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
  .overlay.show{opacity:1;pointer-events:all}
  .sheet{background:var(--surface);border-radius:20px 20px 0 0;
    width:100%;max-width:640px;padding:20px 20px 48px;
    transform:translateY(100%);transition:transform .3s ease;max-height:90vh;overflow-y:auto}
  .overlay.show .sheet{transform:translateY(0)}
  .handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
  .sheet h2{font-size:17px;margin-bottom:16px}
  .fg{margin-bottom:14px}
  .fg label{display:block;font-size:11px;color:var(--silver);margin-bottom:5px;letter-spacing:.08em}
  .fg input,.fg select{width:100%;padding:12px 14px;background:var(--card);
    border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;
    font-family:var(--font);-webkit-appearance:none}
  .fg input:focus,.fg select:focus{outline:none;border-color:var(--amber)}
  .fg select option{background:var(--card)}
  .photo-pick{width:100%;height:100px;background:var(--card);border:1.5px dashed var(--border);
    border-radius:10px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex-direction:column;gap:6px;overflow:hidden}
  .photo-pick img{width:100%;height:100%;object-fit:cover}
  .btn-row{display:flex;gap:10px;margin-top:18px}
  .btn-p{flex:1;padding:14px;background:var(--amber);color:#111;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer}
  .btn-g{flex:1;padding:14px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:11px;font-size:15px;cursor:pointer}
  .btn-d{width:100%;padding:13px;background:none;color:var(--danger);border:1px solid var(--danger);border-radius:11px;font-size:14px;cursor:pointer;margin-top:10px}
  .url-hint{font-size:11px;color:var(--silver);line-height:1.7;background:var(--card);border-radius:9px;padding:10px 12px;margin-bottom:12px}
  .url-hint b{color:var(--amber)}

  /* 解説書メニュー */
  .doc-menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;
    display:flex;align-items:flex-end;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .2s}
  .doc-menu-overlay.show{opacity:1;pointer-events:all}
  .doc-menu{background:var(--surface);border-radius:20px 20px 0 0;
    width:100%;max-width:640px;padding:20px 20px 44px;
    transform:translateY(100%);transition:transform .3s ease}
  .doc-menu-overlay.show .doc-menu{transform:translateY(0)}
  .doc-menu-title{font-size:13px;color:var(--silver);text-align:center;margin-bottom:14px;
    padding-bottom:10px;border-bottom:1px solid var(--border)}
  .doc-menu-btn{display:flex;align-items:center;gap:14px;padding:14px 12px;
    background:none;border:none;color:var(--text);font-size:15px;cursor:pointer;
    width:100%;border-radius:10px;text-align:left}
  .doc-menu-btn:active{background:var(--card)}
  .doc-menu-btn.danger{color:var(--danger)}
  .doc-menu-cancel{width:100%;padding:13px;background:var(--card);border:none;
    color:var(--silver);font-size:14px;cursor:pointer;border-radius:11px;margin-top:8px}

  /* トースト */
  .toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--card);border:1px solid var(--border);color:var(--text);
    padding:11px 22px;border-radius:24px;font-size:14px;z-index:999;
    opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* よく使うタブ */
  .tab-note{font-size:12px;color:var(--dim);text-align:center;margin-bottom:14px}

  /* 故障コード検索 */
  .diag-select-row{display:flex;gap:10px}
  .diag-select-row .fg{flex:1}
  .diag-card{background:var(--card);border:2px solid var(--amber);border-radius:12px;
    padding:16px 16px 14px;margin-bottom:14px;
    box-shadow:0 0 14px rgba(0,229,255,.35),0 0 28px rgba(0,229,255,.12)}
  .diag-card .diag-code{color:var(--amber);font-weight:800;font-size:28px;font-family:var(--mono);
    letter-spacing:.03em;text-shadow:0 0 10px rgba(0,229,255,.7),0 0 20px rgba(0,229,255,.4);
    display:block;line-height:1.2}
  .diag-card .diag-title{font-weight:700;margin:8px 0 12px;font-size:16px;color:#FFD166;line-height:1.5}
  .diag-card .diag-cat{display:inline-block;font-size:10px;color:var(--silver);
    background:var(--surface);border-radius:20px;padding:2px 9px;margin-bottom:6px}
  .diag-card .diag-desc{font-size:13px;color:var(--silver);line-height:1.6;white-space:pre-wrap}
  .diag-card .diag-pdf{display:inline-block;margin-top:10px;font-size:12px;color:var(--amber)}

  /* 故障コード詳細テーブル */
  .diag-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px;
    border:2px solid var(--amber);border-radius:10px;overflow:hidden;
    box-shadow:0 0 10px rgba(0,229,255,.3)}
  .diag-table th,.diag-table td{border:1px solid rgba(0,229,255,.35);padding:10px 12px;text-align:left;vertical-align:top}
  .diag-table th{background:#123544;color:var(--amber);font-weight:700;width:100px;white-space:nowrap;font-size:12.5px}
  .diag-table td{background:var(--card);color:var(--text);line-height:1.7;white-space:pre-wrap}
  .diag-table tr:last-child th,.diag-table tr:last-child td{border-bottom:none}
</style>
</head>
<body>

<header>
  <div class="header-bg">
    <img src="fuso_logo.png" alt="" onerror="this.style.display='none'">
  </div>
  <div class="header-content">
    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;justify-content:flex-end">
      <button class="header-btn" id="main-add-btn" onclick="headerAddBtn()">＋ 整備解説書登録</button>
      <button class="fault-btn" onclick="openFaultSearch()">🔎 故障コード検索</button>
      <button class="photo-list-btn" onclick="openPhotoList()">📸 写真一覧</button>
    </div>
  </div>
</header>

<nav>
  <button class="active" onclick="switchTab('vehicles',this)">🚛 車両一覧</button>
  <button onclick="switchTab('small',this)">📗 小型</button>
  <button onclick="switchTab('medium',this)">📘 中型</button>
  <button onclick="switchTab('large',this)">📙 大型</button>
</nav>

<main>
  <!-- 車両一覧 -->
  <div class="tab-content active" id="tab-vehicles">
    <div class="vehicle-grid" id="vlist">
      <div class="loading"><div class="spinner">⚙️</div><br>読み込み中…</div>
    </div>
  </div>

  <!-- 小型 -->
  <div class="tab-content" id="tab-small">
    <div id="small-list"></div>
  </div>

  <!-- 中型 -->
  <div class="tab-content" id="tab-medium">
    <div id="medium-list"></div>
  </div>

  <!-- 大型 -->
  <div class="tab-content" id="tab-large">
    <div id="large-list"></div>
  </div>


</main>

<!-- 車両登録モーダル -->
<div class="overlay" id="mv" onclick="bgClose(event,'mv')">
  <div class="sheet">
    <div class="handle"></div>
    <h2 id="mv-title">🚛 車両を登録する</h2>
    <div class="fg"><label>メーカー・車種名</label>
      <input id="v-name" type="text" placeholder="例：三菱ふそう スーパーグレート"></div>
    <div class="fg"><label>号車 / 車体番号</label>
      <input id="v-num" type="text" placeholder="例：FP74HD-500817"></div>
    <div class="fg"><label>ニックネーム（任意）</label>
      <input id="v-nick" type="text" placeholder="例：ライキ、1号車"></div>
    <div class="fg"><label>車両写真 URL（任意）</label>
      <div id="photo-preview" style="margin-bottom:8px;display:none;position:relative">
        <img id="photo-preview-img" style="width:100%;height:110px;object-fit:cover;border-radius:10px">
        <button onclick="clearPhoto()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer">✕</button>
      </div>
      <input id="v-photo-url" type="url" placeholder="GoogleドライブのリンクURLを貼り付け" oninput="previewPhotoUrl()">
      <p style="font-size:11px;color:var(--silver);margin-top:5px;line-height:1.6">
        📱 ドライブで写真を開く → 共有 → リンクをコピー → 上に貼り付け
      </p>
    </div>
    <div class="btn-row">
      <button class="btn-g" onclick="closeM('mv')">キャンセル</button>
      <button class="btn-p" id="btn-save-v" onclick="saveVehicle()">登録する</button>
    </div>
    <button class="btn-d" id="btn-del-v" style="display:none" onclick="deleteVehicle()">🗑 この車両を削除する</button>
  </div>
</div>

<!-- 解説書追加モーダル（車両紐づけ） -->
<div class="overlay" id="md" onclick="bgClose(event,'md')">
  <div class="sheet">
    <div class="handle"></div>
    <h2 id="md-title">📄 解説書を追加する</h2>
    <div class="fg"><label>解説書の種類名</label>
      <input id="d-name" type="text" placeholder="例：エンジン整備解説書"></div>
    <div class="url-hint">
      <b>📂 Google DriveのリンクURL</b><br>
      ドライブでPDFを右クリック →「リンクをコピー」→ 下に貼り付け
    </div>
    <div class="fg"><label>Google Drive URL（任意）</label>
      <input id="d-url" type="url" placeholder="https://drive.google.com/file/d/…"></div>
    <div class="btn-row">
      <button class="btn-g" onclick="closeM('md')">キャンセル</button>
      <button class="btn-p" onclick="saveDoc()">追加する</button>
    </div>
    <button class="btn-d" id="btn-del-d" style="display:none" onclick="deleteDoc()">🗑 この解説書を削除する</button>
  </div>
</div>

<!-- 年式別解説書追加モーダル -->
<div class="overlay" id="mm" onclick="bgClose(event,'mm')">
  <div class="sheet">
    <div class="handle"></div>
    <h2 id="mm-title">📚 解説書を追加する</h2>
    <div class="fg"><label>車両サイズ</label>
      <select id="m-size">
        <option value="small">小型</option>
        <option value="medium">中型</option>
        <option value="large">大型</option>
      </select>
    </div>
    <div class="fg"><label>年式</label>
      <input id="m-year" type="text" placeholder="例：2020、令和2年"></div>
    <div class="fg"><label>解説書名</label>
      <input id="m-name" type="text" placeholder="例：キャンター整備解説書"></div>
    <div class="url-hint">
      <b>📂 Google DriveのリンクURL</b><br>
      ドライブでPDFを右クリック →「リンクをコピー」→ 下に貼り付け
    </div>
    <div class="fg"><label>Google Drive URL（任意）</label>
      <input id="m-url" type="url" placeholder="https://drive.google.com/file/d/…"></div>
    <div class="btn-row">
      <button class="btn-g" onclick="closeM('mm')">キャンセル</button>
      <button class="btn-p" onclick="saveManual()">追加する</button>
    </div>
    <button class="btn-d" id="btn-del-m" style="display:none" onclick="deleteManualConfirm()">🗑 この解説書を削除する</button>
  </div>
</div>

<!-- 写真一覧モーダル -->
<div class="overlay" id="photo-list-modal" onclick="bgClose(event,'photo-list-modal')">
  <div class="sheet">
    <div class="handle"></div>
    <h2>📸 写真一覧</h2>
    <p style="font-size:12px;color:var(--silver);margin-bottom:12px;line-height:1.6">

      <button class="btn-g" style="flex:1" onclick="closeM('photo-list-modal')">← 戻る</button>

</div>

<!-- 解説書メニュー（長押し） -->
<div class="doc-menu-overlay" id="doc-menu-overlay" onclick="closeDocMenu()">
  <div class="doc-menu" onclick="event.stopPropagation()">
    <div class="doc-menu-title" id="doc-menu-name"></div>
    <button class="doc-menu-btn" onclick="docMenuOpen()"><span>📂</span> 解説書を開く</button>
    <button class="doc-menu-btn" onclick="docMenuEdit()"><span>✏️</span> 編集・URLを変更する</button>
    <button class="doc-menu-btn danger" onclick="docMenuDelete()"><span>🗑</span> この解説書を削除する</button>
    <button class="doc-menu-cancel" onclick="closeDocMenu()">キャンセル</button>
  </div>
</div>

<!-- 年式別解説書メニュー（長押し） -->
<div class="doc-menu-overlay" id="manual-menu-overlay" onclick="closeManualMenu()">
  <div class="doc-menu" onclick="event.stopPropagation()">
    <div class="doc-menu-title" id="manual-menu-name"></div>
    <button class="doc-menu-btn" onclick="manualMenuOpen()"><span>📂</span> 解説書を開く</button>
    <button class="doc-menu-btn" onclick="manualMenuEdit()"><span>✏️</span> 編集・URLを変更する</button>
    <button class="doc-menu-btn danger" onclick="manualMenuDelete()"><span>🗑</span> この解説書を削除する</button>
    <button class="doc-menu-cancel" onclick="closeManualMenu()">キャンセル</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyRsIMmqTlYPCQgbB7dXiSkXpW1NXofLnh059dGQYmcSpyDSDbCA3PG9Vu9LfiFL38mxg/exec';

async function api(action, data) {
  const dataStr = data ? encodeURIComponent(JSON.stringify(data)) : '';
  const url = GAS_URL + '?action=' + action + (dataStr ? '&data=' + dataStr : '');
  const res = await fetch(url, { redirect: 'follow' });
  return res.json();
}

let vehicles = [], docs = [], manuals = [], photos = [], diagCodes = [];
let editVId = null, editDId = null, editMId = null;
let pendingVId = null, currentSize = 'small';
let photoUrl = null;
let currentTab = 'vehicles';

// ── 初期ロード ──
window.onload = async () => {
  // キャッシュから即表示
  const cached = localStorage.getItem('seibi_cache');
  if (cached) {
    try {
      const c = JSON.parse(cached);
      vehicles = c.vehicles || [];
      docs = c.docs || [];
      manuals = c.manuals || [];
      photos = c.photos || [];
      diagCodes = c.diagCodes || [];
      restoreTab();
    } catch(e) {}
  }

  // バックグラウンドで最新データ取得
  try {
    const d = await api('getAllData');
    if (d.error) throw new Error(d.error);
    vehicles = d.vehicles || [];
    docs = d.docs || [];
    manuals = d.manuals || [];
    photos = d.photos || [];
    diagCodes = d.diagCodes || [];
    localStorage.setItem('seibi_cache', JSON.stringify({vehicles, docs, manuals, photos, diagCodes}));
    restoreTab();
  } catch(e) {
    if (!cached) {
      document.getElementById('vlist').innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div><h3>読み込みエラー</h3><p>${e.message}</p></div>`;
    }
  }
};

function restoreTab() {
  const lastTab = localStorage.getItem('lastTab') || 'vehicles';
  const navBtns = document.querySelectorAll('nav button');
  const tabNames = ['vehicles','small','medium','large'];
  const idx = tabNames.indexOf(lastTab);
  if (idx >= 0) {
    switchTab(lastTab, navBtns[idx]);
  } else {
    render();
  }
}

// ── タブ切替 ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  currentTab = name;
  localStorage.setItem('lastTab', name);

  const addBtn = document.getElementById('main-add-btn');
  if (name === 'vehicles') {
    addBtn.textContent = '＋ 整備解説書登録'; addBtn.style.display = '';
  } else if (name === 'small' || name === 'medium' || name === 'large') {
    const label = name === 'small' ? '小型' : name === 'medium' ? '中型' : '大型';
    addBtn.textContent = '＋ 解説書追加'; addBtn.style.display = '';
  }

  if (name === 'small') renderManuals('small');
  if (name === 'medium') renderManuals('medium');
  if (name === 'large') renderManuals('large');
}

function headerAddBtn() {
  if (currentTab === 'vehicles') {
    openAddVehicle();
  } else if (currentTab === 'small' || currentTab === 'medium' || currentTab === 'large') {
    openAddManual(currentTab);
  }
}

// ── 車両一覧レンダリング ──
function render() {
  const el = document.getElementById('vlist');
  if (!vehicles.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🚛</div>
      <h3>車両が登録されていません</h3>
      <p>右上の「＋ 車両登録」から<br>最初の車両を登録してください</p></div>`;
    return;
  }
  el.innerHTML = vehicles.map(v => cardHTML(v)).join('');
}

function cardHTML(v) {
  const vdocs = docs.filter(d => d.vehicleId === v.id);
  const hasPhoto = v.photo && v.photo !== 'null' && v.photo !== '';
  const thumb = hasPhoto
    ? `<div class="thumb"><img src="${v.photo}" onerror="this.parentNode.innerHTML='🚛'"></div>`
    : `<div class="thumb">🚛</div>`;
  const docItems = vdocs.map(d => {
    const hasUrl = d.driveUrl && d.driveUrl !== 'null' && d.driveUrl.trim();
    const did = d.id;
    return `<div class="doc-item"
      onpointerdown="startLongPress('${did}',event)"
      onpointerup="handleDocTap('${did}',event)"
      onpointercancel="cancelLongPress()"
      onpointermove="cancelLongPress()">
      <span style="font-size:17px">📄</span>
      <span class="doc-name">${esc(d.name)}</span>
      <div class="dot ${hasUrl ? '' : 'no'}"></div>
      <span style="color:var(--dim);font-size:13px">▶</span>
    </div>`;
  }).join('');
  return `<div class="vehicle-card ${v.favorite ? 'fav' : ''}" id="vc-${v.id}">
    <div class="card-head" onclick="openEditVehicle('${v.id}')">
      ${thumb}
      <div class="vinfo">
        <div class="vname">${esc(v.name)}</div>
        <div class="vsub">${esc(v.number)}</div>
        <div class="vmeta">
          ${v.nick && v.nick !== 'null' ? `<span class="badge a">${esc(v.nick)}</span>` : ''}
          <span class="badge">${vdocs.length} 冊</span>
        </div>
      </div>
      <button class="fav-btn ${v.favorite ? 'on' : ''}"
        onclick="event.stopPropagation();toggleFav('${v.id}')">${v.favorite ? '⭐' : '☆'}</button>
    </div>
    <div class="doc-list">${docItems}
      <button class="doc-add" onclick="openAddDoc('${v.id}')">＋ 解説書を追加</button>
    </div>
  </div>`;
}

function renderFav() {
  const favs = vehicles.filter(v => v.favorite);
  const el = document.getElementById('flist');
  el.innerHTML = favs.length ? favs.map(v => cardHTML(v)).join('')
    : `<div class="empty"><div class="empty-icon">⭐</div><h3>お気に入りがありません</h3><p>☆ をタップして登録できます</p></div>`;
}

// ── 年式別解説書レンダリング ──
function renderManuals(size) {
  const el = document.getElementById(size + '-list');
  const items = manuals.filter(m => m.size === size);

  if (!items.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📚</div>
      <h3>解説書が登録されていません</h3>
      <p>右上の「＋ 解説書追加」から<br>登録してください</p></div>`;
    return;
  }

  // 年式でグループ化
  const years = {};
  items.forEach(m => {
    if (!years[m.year]) years[m.year] = [];
    years[m.year].push(m);
  });

  // 年式を降順ソート
  const sortedYears = Object.keys(years).sort((a, b) => b.localeCompare(a));

  el.innerHTML = sortedYears.map(year => {
    const mList = years[year];
    const manualItems = mList.map(m => {
      const hasUrl = m.driveUrl && m.driveUrl !== 'null' && m.driveUrl.trim();
      const mid = m.id;
      return `<div class="manual-item"
        onpointerdown="startManualLongPress('${mid}',event)"
        onpointerup="handleManualTap('${mid}',event)"
        onpointercancel="cancelLongPress()"
        onpointermove="cancelLongPress()">
        <span style="font-size:17px">📄</span>
        <span class="manual-name">${esc(m.name)}</span>
        <div class="dot ${hasUrl ? '' : 'no'}"></div>
        <span style="color:var(--dim);font-size:13px">▶</span>
      </div>`;
    }).join('');

    return `<div class="year-section">
      <div class="year-header" onclick="toggleYear(this)">
        <div class="year-label">
          📅 ${esc(year)}年式
          <span class="year-count">${mList.length}冊</span>
        </div>
        <span class="year-toggle open">▶</span>
      </div>
      <div class="year-manuals">${manualItems}</div>
    </div>`;
  }).join('');
}

function toggleYear(header) {
  const manualList = header.nextElementSibling;
  const toggle = header.querySelector('.year-toggle');
  if (manualList.style.display === 'none') {
    manualList.style.display = 'flex';
    toggle.classList.add('open');
  } else {
    manualList.style.display = 'none';
    toggle.classList.remove('open');
  }
}

// ── お気に入り ──
async function toggleFav(id) {
  try {
    const r = await api('toggleFavorite', { id });
    const v = vehicles.find(v => v.id === id);
    if (v) v.favorite = r.favorite;
    render();
    showToast(r.favorite ? '⭐ お気に入りに追加' : '☆ お気に入りを解除');
  } catch(e) { showToast('エラー: ' + e.message); }
}

// ── 解説書を開く ──
function openDoc(docId) {
  const d = docs.find(d => d.id === docId);
  if (!d) return;
  if (d.driveUrl && d.driveUrl !== 'null' && d.driveUrl.trim()) {
    const m = d.driveUrl.match(/\/file\/d\/([^/?]+)/);
    const url = m ? `https://drive.google.com/file/d/${m[1]}/view` : d.driveUrl;
    window.open(url, '_blank');
  } else {
    openEditDoc(docId);
  }
}

function openManual(manualId) {
  const m = manuals.find(m => m.id === manualId);
  if (!m) return;
  if (m.driveUrl && m.driveUrl !== 'null' && m.driveUrl.trim()) {
    const match = m.driveUrl.match(/\/file\/d\/([^/?]+)/);
    const url = match ? `https://drive.google.com/file/d/${match[1]}/view` : m.driveUrl;
    window.open(url, '_blank');
  } else {
    openEditManual(manualId);
  }
}

// ── 長押しメニュー ──
let longPressTimer = null;
let longPressTriggered = false;
let currentDocId = null;
let currentManualId = null;

function startLongPress(docId, e) {
  cancelLongPress();
  longPressTriggered = false;
  longPressTimer = setTimeout(() => {
    longPressTriggered = true;
    currentDocId = docId;
    const d = docs.find(d => d.id === docId);
    if (d) document.getElementById('doc-menu-name').textContent = d.name;
    document.getElementById('doc-menu-overlay').classList.add('show');
  }, 600);
}

function handleDocTap(docId, e) {
  cancelLongPress();
  if (!longPressTriggered) openDoc(docId);
  longPressTriggered = false;
}

function startManualLongPress(manualId, e) {
  cancelLongPress();
  longPressTriggered = false;
  longPressTimer = setTimeout(() => {
    longPressTriggered = true;
    currentManualId = manualId;
    const m = manuals.find(m => m.id === manualId);
    if (m) document.getElementById('manual-menu-name').textContent = m.name;
    document.getElementById('manual-menu-overlay').classList.add('show');
  }, 600);
}

function handleManualTap(manualId, e) {
  cancelLongPress();
  if (!longPressTriggered) openManual(manualId);
  longPressTriggered = false;
}

function cancelLongPress() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}

function closeDocMenu() {
  document.getElementById('doc-menu-overlay').classList.remove('show');
  currentDocId = null;
}
function closeManualMenu() {
  document.getElementById('manual-menu-overlay').classList.remove('show');
  currentManualId = null;
}

function docMenuOpen() { const id = currentDocId; closeDocMenu(); openDoc(id); }
function docMenuEdit() { const id = currentDocId; closeDocMenu(); openEditDoc(id); }
async function docMenuDelete() {
  const id = currentDocId; closeDocMenu();
  if (!confirm('この解説書を削除しますか？')) return;
  try {
    await api('deleteDoc', { id });
    docs = docs.filter(d => d.id !== id);
    render(); showToast('🗑 削除しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

function manualMenuOpen() { const id = currentManualId; closeManualMenu(); openManual(id); }
function manualMenuEdit() { const id = currentManualId; closeManualMenu(); openEditManual(id); }
async function manualMenuDelete() {
  const id = currentManualId; closeManualMenu();
  if (!confirm('この解説書を削除しますか？')) return;
  try {
    await api('deleteManual', { id });
    const m = manuals.find(m => m.id === id);
    const size = m ? m.size : currentTab;
    manuals = manuals.filter(m => m.id !== id);
    renderManuals(size); showToast('🗑 削除しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

// ── 車両モーダル ──
function openAddVehicle() {
  editVId = null; photoUrl = null;
  ['v-name','v-num','v-nick','v-photo-url'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('mv-title').textContent = '🚛 車両を登録する';
  document.getElementById('btn-del-v').style.display = 'none';
  document.getElementById('btn-save-v').textContent = '登録する';
  showM('mv');
}
function openEditVehicle(id) {
  const v = vehicles.find(v => v.id === id); if (!v) return;
  editVId = id;
  photoUrl = (v.photo && v.photo !== 'null') ? v.photo : null;
  document.getElementById('v-name').value = v.name;
  document.getElementById('v-num').value = v.number;
  document.getElementById('v-nick').value = (v.nick && v.nick !== 'null') ? v.nick : '';
  document.getElementById('v-photo-url').value = photoUrl || '';
  const preview = document.getElementById('photo-preview');
  const previewImg = document.getElementById('photo-preview-img');
  if (photoUrl) { previewImg.src = driveUrlToImg(photoUrl); preview.style.display = 'block'; }
  else { preview.style.display = 'none'; }
  document.getElementById('mv-title').textContent = '✏️ 車両を編集する';
  document.getElementById('btn-del-v').style.display = 'block';
  document.getElementById('btn-save-v').textContent = '更新する';
  showM('mv');
}
async function saveVehicle() {
  const name = document.getElementById('v-name').value.trim();
  const number = document.getElementById('v-num').value.trim();
  const nick = document.getElementById('v-nick').value.trim();
  if (!name) { showToast('車両名を入力してください'); return; }
  const photoInput = document.getElementById('v-photo-url').value.trim();
  let finalPhotoUrl = '';
  if (photoInput) {
    const m = photoInput.match(/\/file\/d\/([^/?]+)/);
    finalPhotoUrl = m ? 'https://lh3.googleusercontent.com/d/' + m[1] : photoInput;
  }
  showToast('保存中…');
  const data = { name, number, nick, photo: finalPhotoUrl };
  try {
    if (editVId) {
      data.id = editVId;
      await api('updateVehicle', data);
      const v = vehicles.find(v => v.id === editVId);
      if (v) Object.assign(v, data);
      showToast('✅ 更新しました');
    } else {
      const r = await api('addVehicle', data);
      vehicles.push({ ...data, id: r.id, favorite: false });
      showToast('✅ 車両を登録しました');
    }
    render(); closeM('mv');
  } catch(e) { showToast('エラー: ' + e.message); }
}
async function deleteVehicle() {
  if (!confirm('この車両と解説書をすべて削除しますか？')) return;
  try {
    await api('deleteVehicle', { id: editVId });
    vehicles = vehicles.filter(v => v.id !== editVId);
    docs = docs.filter(d => d.vehicleId !== editVId);
    render(); closeM('mv'); showToast('🗑 削除しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

// ── 写真URL ──
function driveUrlToImg(url) {
  if (!url) return '';
  const m = url.match(/\/file\/d\/([^/?]+)/);
  if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
  return url;
}
function previewPhotoUrl() {
  const url = document.getElementById('v-photo-url').value.trim();
  const preview = document.getElementById('photo-preview');
  const img = document.getElementById('photo-preview-img');
  if (url) {
    img.src = driveUrlToImg(url);
    img.onerror = () => { preview.style.display = 'none'; };
    preview.style.display = 'block';
  } else { preview.style.display = 'none'; }
}
function clearPhoto() {
  document.getElementById('v-photo-url').value = '';
  document.getElementById('photo-preview').style.display = 'none';
  photoUrl = null;
}

// ── 車両解説書モーダル ──
function openAddDoc(vehicleId) {
  pendingVId = vehicleId; editDId = null;
  document.getElementById('d-name').value = '';
  document.getElementById('d-url').value = '';
  document.getElementById('md-title').textContent = '📄 解説書を追加する';
  document.getElementById('btn-del-d').style.display = 'none';
  showM('md');
}
function openEditDoc(docId) {
  const d = docs.find(d => d.id === docId); if (!d) return;
  editDId = docId; pendingVId = d.vehicleId;
  document.getElementById('d-name').value = d.name;
  document.getElementById('d-url').value = (d.driveUrl && d.driveUrl !== 'null') ? d.driveUrl : '';
  document.getElementById('md-title').textContent = '✏️ 解説書を編集する';
  document.getElementById('btn-del-d').style.display = 'block';
  showM('md');
}
async function saveDoc() {
  const name = document.getElementById('d-name').value.trim();
  const driveUrl = document.getElementById('d-url').value.trim();

function renderPhotoGrid() {
  const el = document.getElementById('photo-grid');
  const withPhoto = vehicles.filter(v => v.photo && v.photo !== 'null' && v.photo !== '');

  // 追加ボタン込みで表示
  let html = '';
  if (withPhoto.length) {
    html += withPhoto.map(v => `
      <div style="position:relative;border-radius:10px;overflow:hidden;cursor:pointer;
        border:2px solid #9B30FF;box-shadow:0 0 10px rgba(155,48,255,.4)"
        onclick="zoomPhoto('${encodeURIComponent(v.photo)}','${encodeURIComponent(v.name)}','${encodeURIComponent(v.number)}')"
        ontouchstart="startPhotoLongPress('${v.id}',event)"
        ontouchend="cancelLongPress()"
        ontouchmove="cancelLongPress()">
        <img src="${v.photo}" style="width:100%;height:120px;object-fit:cover;display:block"
          onerror="this.parentNode.style.display='none'">
        <div style="padding:6px 8px;background:var(--card)">
          <div style="font-size:12px;font-weight:700;color:#00E5FF;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(v.name)}</div>
          <div style="font-size:10px;color:var(--silver);font-family:var(--mono)">${esc(v.number)}</div>
        </div>
      </div>`).join('');
  }

  // 写真一覧（独立登録分）
  if (photos.length) {
    html += photos.map(p => `
      <div style="position:relative;border-radius:10px;overflow:hidden;cursor:pointer;
        border:2px solid #9B30FF;box-shadow:0 0 10px rgba(155,48,255,.4)"
        onclick="zoomPhotoExtra('${encodeURIComponent(p.photoUrl)}','${encodeURIComponent(p.title)}')"
        ontouchstart="startExtraPhotoLongPress('${p.id}',event)"
        ontouchend="cancelLongPress()"
        ontouchmove="cancelLongPress()">
        <img src="${driveUrlToImg(p.photoUrl)}" style="width:100%;height:120px;object-fit:cover;display:block"
          onerror="this.parentNode.style.display='none'">
        <div style="padding:6px 8px;background:var(--card)">
          <div style="font-size:12px;font-weight:700;color:#C89EFF;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.title)}</div>
        </div>
      </div>`).join('');
  }

  // 写真なし車両の追加ボタン
  const noPhoto = vehicles.filter(v => !v.photo || v.photo === 'null' || v.photo === '');
  if (noPhoto.length) {
    html += noPhoto.map(v => `
      <div style="border-radius:10px;overflow:hidden;cursor:pointer;
        border:1.5px dashed var(--border);display:flex;flex-direction:column;
        align-items:center;justify-content:center;height:155px;gap:6px"
        onclick="addPhotoFromList('${v.id}')">
        <span style="font-size:28px">📷</span>
        <span style="font-size:11px;color:var(--dim);text-align:center;padding:0 8px">${esc(v.name)}<br>写真を追加</span>
      </div>`).join('');
  }

  if (!html) {
    el.innerHTML = `<div style="grid-column:span 2;text-align:center;padding:40px;color:var(--dim)">
      <div style="font-size:48px;margin-bottom:12px">📷</div>
      <p>車両が登録されていません</p></div>`;
  } else {
    el.innerHTML = html;
  }

// ── 故障コード詳細を項目ごとに分解してテーブル化 ──
const DIAG_SECTION_LABELS = ['発生条件','復帰性','ECUの制御内容','ウォーニング表示','推定要因'];

function parseDiagSections(desc) {
  const text = String(desc || '');
  const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');

  const idx = {};
  DIAG_SECTION_LABELS.forEach(label => {
    const i = lines.findIndex(l => l === label);
    if (i !== -1) idx[label] = i;
  });

  const foundLabels = DIAG_SECTION_LABELS.filter(l => idx[l] !== undefined)
    .sort((a, b) => idx[a] - idx[b]);

  // ラベルが1つも見つからない場合は従来通り生テキストを返す
  if (!foundLabels.length) return { raw: text };

  const sections = {};
  const preamble = lines.slice(0, idx[foundLabels[0]]); // 最初のラベルより前の行は最初の項目の内容として扱う

  foundLabels.forEach((label, i) => {
    const start = idx[label] + 1;
    const end = (i + 1 < foundLabels.length) ? idx[foundLabels[i + 1]] : lines.length;
    let content = lines.slice(start, end);
    if (i === 0) content = preamble.concat(content);
    sections[label] = content.join('\n');
  });

  return sections;
}

function diagDescHTML(d) {
  const sections = parseDiagSections(d.description);
  if (sections.raw !== undefined) {
    return `<div class="diag-desc">${esc(sections.raw)}</div>`;
  }
  const rows = DIAG_SECTION_LABELS
    .filter(label => sections[label])
    .map(label => `<tr><th>${esc(label)}</th><td>${esc(sections[label])}</td></tr>`)
    .join('');
  return `<table class="diag-table">${rows}</table>`;
}

function runDiagSearch() {
  const vehicleType = document.getElementById('diag-vehicle-type').value;
  const year = document.getElementById('diag-year').value;
  const codeQuery = document.getElementById('diag-code').value.trim().toUpperCase();
  const resultEl = document.getElementById('diag-result');

  if (!vehicleType || !year) { resultEl.innerHTML = ''; return; }
  if (!codeQuery) { resultEl.innerHTML = ''; return; }

  const rows = diagCodes.filter(d =>
    d.vehicleType === vehicleType &&
    String(d.year) === String(year) &&
    String(d.code || '').toUpperCase().includes(codeQuery)
  );

  if (!rows.length) {
    resultEl.innerHTML = `<div class="empty" style="padding:30px 10px">
      <div class="empty-icon" style="font-size:36px">🔍</div>
      <p>該当する故障コードが見つかりません</p></div>`;
    return;
  }

  resultEl.innerHTML = rows.map(d => `
    <div class="diag-card">
      ${d.category ? `<div class="diag-cat">${esc(d.category)}</div>` : ''}
      <div class="diag-code">${esc(d.code)}</div>
      <div class="diag-title">${esc(d.title)}</div>
      ${diagDescHTML(d)}
      ${d.pdfUrl ? `<a class="diag-pdf" href="${driveViewUrl(d.pdfUrl)}" target="_blank">📄 元PDFを開く${d.page ? '（P.' + esc(d.page) + '）' : ''}</a>` : ''}
    </div>
  `).join('');
}

function driveViewUrl(url) {
  const m = (url || '').match(/\/file\/d\/([^/?]+)/);
  return m ? `https://drive.google.com/file/d/${m[1]}/view` : url;
}

function esc(s) { return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
