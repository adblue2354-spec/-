<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>整備解説書ビューワー</title>
<style>
  :root{--bg:#1C1F24;--surface:#252930;--card:#2D3139;--border:#3A404A;
    --amber:#F5A623;--amber-d:#B87A1A;--silver:#8A9BA8;--text:#E8ECF0;
    --dim:#6B7785;--danger:#E05252;--green:#4CAF7D;--r:12px;
    --font:'Hiragino Sans','Noto Sans JP',sans-serif;--mono:'SF Mono','Courier New',monospace}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;font-size:16px}
  .logo-icon-img{width:52px;height:40px;border-radius:6px;overflow:hidden;
    flex-shrink:0;background:#000;display:flex;align-items:center;justify-content:center}
  .logo-icon-img img{width:100%;height:100%;object-fit:contain}
  header{background:var(--surface);border-bottom:2px solid var(--amber);padding:16px 18px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{display:flex;align-items:center;gap:12px}
  .logo-icon{width:40px;height:40px;background:var(--amber);border-radius:8px;
    display:flex;align-items:center;justify-content:center;font-size:22px}
  .logo-text strong{font-size:16px;letter-spacing:.04em;display:block}
  .logo-text span{font-size:11px;color:var(--silver);font-family:var(--mono)}
  .header-btn{background:var(--amber);color:#111;border:none;border-radius:10px;
    padding:10px 16px;font-size:15px;font-weight:700;cursor:pointer}
  nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
  nav button{flex:1;padding:14px 8px;background:none;border:none;
    color:var(--dim);font-size:14px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
  nav button.active{color:var(--amber);border-bottom-color:var(--amber);font-weight:700}
  main{padding:16px;max-width:640px;margin:0 auto}
  .vehicle-grid{display:flex;flex-direction:column;gap:14px}
  .vehicle-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
  .vehicle-card.fav{border-color:var(--amber-d)}
  .card-head{display:flex;align-items:center;gap:14px;padding:14px;border-bottom:1px solid var(--border);cursor:pointer}
  .thumb{width:72px;height:54px;border-radius:8px;background:var(--border);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .vinfo{flex:1;min-width:0}
  .vname{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .vsub{font-size:13px;color:var(--silver);font-family:var(--mono);margin-top:3px}
  .vmeta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
  .badge{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--border);color:var(--silver)}
  .badge.a{background:#3A2E10;color:var(--amber)}
  .fav-btn{background:none;border:none;font-size:24px;cursor:pointer;padding:4px;opacity:.45;flex-shrink:0}
  .fav-btn.on{opacity:1}
  .doc-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
  .doc-item{display:flex;align-items:center;gap:12px;padding:12px 14px;
    background:var(--surface);border-radius:9px;cursor:pointer}
  .doc-item:active{background:var(--border)}
  .doc-name{flex:1;font-size:15px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
  .dot.no{background:var(--dim)}
  .doc-menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;
    display:flex;align-items:flex-end;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .2s}
  .doc-menu-overlay.show{opacity:1;pointer-events:all}
  .doc-menu{background:var(--surface);border-radius:20px 20px 0 0;
    width:100%;max-width:640px;padding:20px 20px 44px;
    transform:translateY(100%);transition:transform .3s ease}
  .doc-menu-overlay.show .doc-menu{transform:translateY(0)}
  .doc-menu-title{font-size:13px;color:var(--silver);text-align:center;margin-bottom:16px;
    padding-bottom:12px;border-bottom:1px solid var(--border)}
  .doc-menu-btn{display:flex;align-items:center;gap:14px;padding:15px 12px;
    background:none;border:none;color:var(--text);font-size:16px;cursor:pointer;
    width:100%;border-radius:10px;text-align:left}
  .doc-menu-btn:active{background:var(--card)}
  .doc-menu-btn.danger{color:var(--danger)}
  .doc-menu-cancel{width:100%;padding:14px;background:var(--card);border:none;
    color:var(--silver);font-size:15px;cursor:pointer;border-radius:11px;margin-top:8px}
  .doc-add{margin:2px 0 8px;padding:12px;background:none;border:1.5px dashed var(--border);
    border-radius:9px;color:var(--dim);font-size:14px;cursor:pointer;text-align:center;width:100%}
  .doc-add:active{border-color:var(--amber);color:var(--amber)}
  .empty{text-align:center;padding:70px 20px;color:var(--dim)}
  .empty-icon{font-size:56px;margin-bottom:18px}
  .empty h3{font-size:18px;color:var(--text);margin-bottom:10px}
  .empty p{font-size:14px;line-height:1.7}
  .loading{text-align:center;padding:70px 20px;color:var(--dim)}
  .spinner{font-size:36px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);
    display:flex;align-items:flex-end;justify-content:center;
    z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
  .overlay.show{opacity:1;pointer-events:all}
  .sheet{background:var(--surface);border-radius:20px 20px 0 0;
    width:100%;max-width:640px;padding:22px 22px 48px;
    transform:translateY(100%);transition:transform .3s ease;max-height:90vh;overflow-y:auto}
  .overlay.show .sheet{transform:translateY(0)}
  .handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
  .sheet h2{font-size:18px;margin-bottom:18px}
  .fg{margin-bottom:16px}
  .fg label{display:block;font-size:12px;color:var(--silver);margin-bottom:6px;letter-spacing:.08em}
  .fg input{width:100%;padding:13px 15px;background:var(--card);
    border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;
    font-family:var(--font);-webkit-appearance:none}
  .fg input:focus{outline:none;border-color:var(--amber)}
  .photo-pick{width:100%;height:110px;background:var(--card);border:1.5px dashed var(--border);
    border-radius:10px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex-direction:column;gap:8px;overflow:hidden;position:relative}
  .photo-pick img{width:100%;height:100%;object-fit:cover}
  .photo-pick .pick-label{font-size:13px;color:var(--dim)}
  .photo-uploading{position:absolute;inset:0;background:rgba(0,0,0,.6);
    display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
  .btn-row{display:flex;gap:12px;margin-top:20px}
  .btn-p{flex:1;padding:15px;background:var(--amber);color:#111;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer}
  .btn-g{flex:1;padding:15px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:11px;font-size:16px;cursor:pointer}
  .btn-d{width:100%;padding:14px;background:none;color:var(--danger);border:1px solid var(--danger);border-radius:11px;font-size:15px;cursor:pointer;margin-top:12px}
  .url-hint{font-size:12px;color:var(--silver);line-height:1.7;background:var(--card);border-radius:9px;padding:12px 14px;margin-bottom:14px}
  .url-hint b{color:var(--amber)}
  .toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--card);border:1px solid var(--border);color:var(--text);
    padding:12px 24px;border-radius:24px;font-size:14px;z-index:999;
    opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .search-wrap{margin-bottom:16px}
  .search-wrap input{width:100%;padding:13px 16px;background:var(--card);
    border:1px solid var(--border);border-radius:11px;color:var(--text);
    font-size:16px;font-family:var(--font);-webkit-appearance:none}
  .search-wrap input:focus{outline:none;border-color:var(--amber)}
  .tab-note{font-size:13px;color:var(--dim);text-align:center;margin-bottom:16px}
  .tab-content{display:none}
  .tab-content.active{display:block}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon-img">
      <img src="fuso_logo.png" alt="FUSO" onerror="this.parentNode.innerHTML='🔧'">
    </div>
    <div class="logo-text">
      <strong>整備解説書ビューワー</strong>
      <span>KASHIWA SERVICE CENTER</span>
    </div>
  </div>
  <button class="header-btn" onclick="openAddVehicle()">＋ 車両登録</button>
</header>
<nav>
  <button class="active" onclick="switchTab('vehicles',this)">🚛 車両一覧</button>
  <button onclick="switchTab('favorites',this)">⭐ よく使う</button>
  <button onclick="switchTab('search',this)">🔍 検索</button>
</nav>
<main>
  <div class="tab-content active" id="tab-vehicles">
    <div class="vehicle-grid" id="vlist">
      <div class="loading"><div class="spinner">⚙️</div><br>読み込み中…</div>
    </div>
  </div>
  <div class="tab-content" id="tab-favorites">
    <p class="tab-note">⭐ お気に入り登録した車両が表示されます</p>
    <div class="vehicle-grid" id="flist"></div>
  </div>
  <div class="tab-content" id="tab-search">
    <div class="search-wrap">
      <input type="search" id="sinput" placeholder="車両名・号車・解説書名で検索…" oninput="doSearch()" autocomplete="off">
    </div>
    <div class="vehicle-grid" id="slist"></div>
  </div>
</main>

<!-- 車両登録モーダル -->
<div class="overlay" id="mv" onclick="bgClose(event,'mv')">
  <div class="sheet">
    <div class="handle"></div>
    <h2 id="mv-title">🚛 車両を登録する</h2>
    <div class="fg"><label>メーカー・車種名</label>
      <input id="v-name" type="text" placeholder="例：三菱ふそう スーパーグレート"></div>
    <div class="fg"><label>号車 / 車体番号</label>
      <input id="v-num" type="text" placeholder="例：FP74HD-500817"></div>
    <div class="fg"><label>ニックネーム（任意）</label>
      <input id="v-nick" type="text" placeholder="例：ライキ、1号車"></div>
    <div class="fg"><label>車両写真（任意）</label>
      <div id="photo-preview" style="margin-bottom:8px;display:none;position:relative">
        <img id="photo-preview-img" style="width:100%;height:120px;object-fit:cover;border-radius:10px">
        <button onclick="clearPhoto()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer">✕</button>
      </div>
      <input id="v-photo-url" type="url" placeholder="GoogleドライブのリンクURLを貼り付け" oninput="previewPhotoUrl()">
      <p style="font-size:11px;color:var(--silver);margin-top:6px;line-height:1.7">
        📱 手順：Googleドライブで写真を開く → 共有 → リンクをコピー → 上に貼り付け
      </p>
    </div>
    <div class="btn-row">
      <button class="btn-g" onclick="closeM('mv')">キャンセル</button>
      <button class="btn-p" id="btn-save-v" onclick="saveVehicle()">登録する</button>
    </div>
    <button class="btn-d" id="btn-del-v" style="display:none" onclick="deleteVehicle()">🗑 この車両を削除する</button>
  </div>
</div>

<!-- 解説書モーダル -->
<div class="overlay" id="md" onclick="bgClose(event,'md')">
  <div class="sheet">
    <div class="handle"></div>
    <h2 id="md-title">📄 解説書を追加する</h2>
    <div class="fg"><label>解説書の種類名</label>
      <input id="d-name" type="text" placeholder="例：エンジン整備解説書"></div>
    <div class="url-hint">
      <b>📂 Google DriveのリンクURL</b><br>
      ドライブでPDFを右クリック →「リンクをコピー」→ 下に貼り付け<br>
      ※後からでも追加・変更できます
    </div>
    <div class="fg"><label>Google Drive URL（任意）</label>
      <input id="d-url" type="url" placeholder="https://drive.google.com/file/d/…"></div>
    <div class="btn-row">
      <button class="btn-g" onclick="closeM('md')">キャンセル</button>
      <button class="btn-p" onclick="saveDoc()">追加する</button>
    </div>
    <button class="btn-d" id="btn-del-d" style="display:none" onclick="deleteDoc()">🗑 この解説書を削除する</button>
  </div>
</div>

<!-- 解説書メニュー -->
<div class="doc-menu-overlay" id="doc-menu-overlay" onclick="closeDocMenu()">
  <div class="doc-menu" onclick="event.stopPropagation()">
    <div class="doc-menu-title" id="doc-menu-name">解説書メニュー</div>
    <button class="doc-menu-btn" onclick="docMenuOpen()">
      <span>📂</span> 解説書を開く
    </button>
    <button class="doc-menu-btn" onclick="docMenuEdit()">
      <span>✏️</span> 編集・URLを変更する
    </button>
    <button class="doc-menu-btn danger" onclick="docMenuDelete()">
      <span>🗑</span> この解説書を削除する
    </button>
    <button class="doc-menu-cancel" onclick="closeDocMenu()">キャンセル</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyx9MoeM7nHAoY9H6GZr6y5zOhvJmnF0fGmPSRq_qe29-yvDgS2nDRMXMYWGte5XZlf/exec';

async function api(action, data) {
  const dataStr = data ? encodeURIComponent(JSON.stringify(data)) : '';
  const url = GAS_URL + '?action=' + action + (dataStr ? '&data=' + dataStr : '');
  const res = await fetch(url, { redirect: 'follow' });
  const text = await res.text();
  return JSON.parse(text);
}

let vehicles = [], docs = [];
let editVId = null, editDId = null, pendingVId = null;
let photoUrl = null;

window.onload = async () => {
  try {
    const d = await api('getAllData');
    if (d.error) throw new Error(d.error);
    vehicles = d.vehicles || [];
    docs = d.docs || [];
    render();
  } catch(e) {
    document.getElementById('vlist').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><h3>読み込みエラー</h3><p>${e.message}</p></div>`;
  }
};

function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'favorites') renderFav();
  if (name === 'search') { document.getElementById('sinput').value = ''; document.getElementById('slist').innerHTML = ''; }
}

function render() {
  const el = document.getElementById('vlist');
  if (!vehicles.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🚛</div>
      <h3>車両が登録されていません</h3>
      <p>右上の「＋ 車両登録」から<br>最初の車両を登録してください</p></div>`;
    return;
  }
  el.innerHTML = vehicles.map(v => cardHTML(v)).join('');
}

function cardHTML(v) {
  const vdocs = docs.filter(d => d.vehicleId === v.id);
  const hasPhoto = v.photo && v.photo !== 'null' && v.photo !== '';
  const thumb = hasPhoto
    ? `<div class="thumb"><img src="${v.photo}" onerror="this.parentNode.innerHTML='🚛'"></div>`
    : `<div class="thumb">🚛</div>`;
  const docItems = vdocs.map(d => {
    const hasUrl = d.driveUrl && d.driveUrl !== 'null' && d.driveUrl.trim();
    return `<div class="doc-item"
      onclick="openDoc('${d.id}')"
      ontouchstart="startLongPress('${d.id}',event)"
      ontouchend="cancelLongPress()"
      ontouchmove="cancelLongPress()">
      <span style="font-size:18px">📄</span>
      <span class="doc-name">${esc(d.name)}</span>
      <div class="dot ${hasUrl ? '' : 'no'}"></div>
      <span style="color:var(--dim);font-size:14px">▶</span>
    </div>`;
  }).join('');
  return `<div class="vehicle-card ${v.favorite ? 'fav' : ''}" id="vc-${v.id}">
    <div class="card-head" onclick="openEditVehicle('${v.id}')">
      ${thumb}
      <div class="vinfo">
        <div class="vname">${esc(v.name)}</div>
        <div class="vsub">${esc(v.number)}</div>
        <div class="vmeta">
          ${v.nick && v.nick !== 'null' ? `<span class="badge a">${esc(v.nick)}</span>` : ''}
          <span class="badge">${vdocs.length} 冊</span>
        </div>
      </div>
      <button class="fav-btn ${v.favorite ? 'on' : ''}"
        onclick="event.stopPropagation();toggleFav('${v.id}')">${v.favorite ? '⭐' : '☆'}</button>
    </div>
    <div class="doc-list">${docItems}
      <button class="doc-add" onclick="openAddDoc('${v.id}')">＋ 解説書を追加</button>
    </div>
  </div>`;
}

function renderFav() {
  const favs = vehicles.filter(v => v.favorite);
  const el = document.getElementById('flist');
  el.innerHTML = favs.length ? favs.map(v => cardHTML(v)).join('')
    : `<div class="empty"><div class="empty-icon">⭐</div><h3>お気に入りがありません</h3><p>☆ をタップして登録できます</p></div>`;
}

function doSearch() {
  const q = document.getElementById('sinput').value.trim().toLowerCase();
  const el = document.getElementById('slist');
  if (!q) { el.innerHTML = ''; return; }
  const r = vehicles.filter(v =>
    v.name.toLowerCase().includes(q) || v.number.toLowerCase().includes(q) ||
    (v.nick||'').toLowerCase().includes(q) ||
    docs.filter(d => d.vehicleId === v.id).some(d => d.name.toLowerCase().includes(q))
  );
  el.innerHTML = r.length ? r.map(v => cardHTML(v)).join('')
    : `<div class="empty"><div class="empty-icon">🔍</div><h3>見つかりませんでした</h3></div>`;
}

async function toggleFav(id) {
  try {
    const r = await api('toggleFavorite', { id });
    const v = vehicles.find(v => v.id === id);
    if (v) v.favorite = r.favorite;
    render();
    showToast(r.favorite ? '⭐ お気に入りに追加' : '☆ お気に入りを解除');
  } catch(e) { showToast('エラー: ' + e.message); }
}

// ── 長押しメニュー ──
let longPressTimer = null;
let currentDocId = null;

function startLongPress(docId, e) {
  cancelLongPress();
  longPressTimer = setTimeout(() => {
    e.preventDefault();
    currentDocId = docId;
    const d = docs.find(d => d.id === docId);
    if (d) document.getElementById('doc-menu-name').textContent = d.name;
    document.getElementById('doc-menu-overlay').classList.add('show');
  }, 600);
}

function cancelLongPress() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}

function closeDocMenu() {
  document.getElementById('doc-menu-overlay').classList.remove('show');
  currentDocId = null;
}

function docMenuOpen() {
  closeDocMenu();
  if (currentDocId) openDoc(currentDocId);
}

function docMenuEdit() {
  closeDocMenu();
  if (currentDocId) openEditDoc(currentDocId);
}

async function docMenuDelete() {
  if (!currentDocId) return;
  const id = currentDocId;
  closeDocMenu();
  if (!confirm('この解説書を削除しますか？')) return;
  try {
    await api('deleteDoc', { id });
    docs = docs.filter(d => d.id !== id);
    render(); showToast('🗑 解説書を削除しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

// 写真URLプレビュー
function driveUrlToImg(url) {
  if (!url) return '';
  // /file/d/ID/view 形式
  const m1 = url.match(/\/file\/d\/([^/?]+)/);
  if (m1) return 'https://lh3.googleusercontent.com/d/' + m1[1];
  // thumbnail形式はそのまま
  if (url.includes('thumbnail')) return url;
  return url;
}

function previewPhotoUrl() {
  const url = document.getElementById('v-photo-url').value.trim();
  const preview = document.getElementById('photo-preview');
  const img = document.getElementById('photo-preview-img');
  if (url) {
    img.src = driveUrlToImg(url);
    img.onerror = () => { img.src = ''; preview.style.display = 'none'; };
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
}

function clearPhoto() {
  document.getElementById('v-photo-url').value = '';
  document.getElementById('photo-preview').style.display = 'none';
  photoUrl = null;
}

function openDoc(docId) {
  const d = docs.find(d => d.id === docId);
  if (!d) return;
  if (d.driveUrl && d.driveUrl !== 'null' && d.driveUrl.trim()) {
    const m = d.driveUrl.match(/\/file\/d\/([^/]+)/);
    const url = m ? `https://drive.google.com/file/d/${m[1]}/view` : d.driveUrl;
    window.open(url, '_blank');
  } else {
    openEditDoc(docId);
  }
}

function openAddVehicle() {
  editVId = null; photoUrl = null;
  ['v-name','v-num','v-nick','v-photo-url'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('mv-title').textContent = '🚛 車両を登録する';
  document.getElementById('btn-del-v').style.display = 'none';
  document.getElementById('btn-save-v').textContent = '登録する';
  showM('mv');
}

function openEditVehicle(id) {
  const v = vehicles.find(v => v.id === id); if (!v) return;
  editVId = id;
  photoUrl = (v.photo && v.photo !== 'null') ? v.photo : null;
  document.getElementById('v-name').value = v.name;
  document.getElementById('v-num').value = v.number;
  document.getElementById('v-nick').value = (v.nick && v.nick !== 'null') ? v.nick : '';
  document.getElementById('v-photo-url').value = photoUrl || '';
  const preview = document.getElementById('photo-preview');
  const previewImg = document.getElementById('photo-preview-img');
  if (photoUrl) {
    previewImg.src = driveUrlToImg(photoUrl);
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
  document.getElementById('mv-title').textContent = '✏️ 車両を編集する';
  document.getElementById('btn-del-v').style.display = 'block';
  document.getElementById('btn-save-v').textContent = '更新する';
  showM('mv');
}

// 写真選択→Driveにアップロード
async function handlePhoto(e) {
  const f = e.target.files[0]; if (!f) return;
  if (photoUploading) return;
  photoUploading = true;

  // プレビュー表示（ローカル）
  const reader = new FileReader();
  reader.onload = async ev => {
    const pp = document.getElementById('ppick');
    pp.innerHTML = `<img src="${ev.target.result}"><div class="photo-uploading">📤 アップロード中…</div>`;

    try {
      // 画像をリサイズ（長辺400px）
      const resized = await resizeImage(ev.target.result, 400);
      const r = await api('uploadPhoto', { base64: resized, mimeType: f.type });
      if (r.error) throw new Error(r.error);
      photoUrl = r.url;
      pp.innerHTML = `<img src="${photoUrl}" onerror="this.src='${ev.target.result}'">`;
      showToast('📷 写真をアップロードしました');
    } catch(err) {
      pp.innerHTML = '<span style="font-size:28px">📷</span><span class="pick-label">タップして写真を選ぶ</span>';
      showToast('写真エラー: ' + err.message);
    }
    photoUploading = false;
  };
  reader.readAsDataURL(f);
  e.target.value = '';
}

// 画像リサイズ（Canvasで圧縮）
function resizeImage(dataUrl, maxSize) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > h && w > maxSize) { h = h * maxSize / w; w = maxSize; }
      else if (h > maxSize) { w = w * maxSize / h; h = maxSize; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = dataUrl;
  });
}

async function saveVehicle() {
  const name   = document.getElementById('v-name').value.trim();
  const number = document.getElementById('v-num').value.trim();
  const nick   = document.getElementById('v-nick').value.trim();
  if (!name) { showToast('車両名を入力してください'); return; }
  const photoInput = document.getElementById('v-photo-url').value.trim();
  let finalPhotoUrl = '';
  if (photoInput) {
    const m = photoInput.match(/\/file\/d\/([^/?]+)/);
    finalPhotoUrl = m ? 'https://lh3.googleusercontent.com/d/' + m[1] : photoInput;
  }
  showToast('保存中…');
  const data = { name, number, nick, photo: finalPhotoUrl };
  try {
    if (editVId) {
      data.id = editVId;
      await api('updateVehicle', data);
      const v = vehicles.find(v => v.id === editVId);
      if (v) Object.assign(v, data);
      showToast('✅ 更新しました');
    } else {
      const r = await api('addVehicle', data);
      vehicles.push({ ...data, id: r.id, favorite: false });
      showToast('✅ 車両を登録しました');
    }
    render(); closeM('mv');
  } catch(e) { showToast('エラー: ' + e.message); }
}

async function deleteVehicle() {
  if (!confirm('この車両と解説書をすべて削除しますか？')) return;
  try {
    await api('deleteVehicle', { id: editVId });
    vehicles = vehicles.filter(v => v.id !== editVId);
    docs = docs.filter(d => d.vehicleId !== editVId);
    render(); closeM('mv'); showToast('🗑 削除しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

function openAddDoc(vehicleId) {
  pendingVId = vehicleId; editDId = null;
  document.getElementById('d-name').value = '';
  document.getElementById('d-url').value = '';
  document.getElementById('md-title').textContent = '📄 解説書を追加する';
  document.getElementById('btn-del-d').style.display = 'none';
  showM('md');
}

function openEditDoc(docId) {
  const d = docs.find(d => d.id === docId); if (!d) return;
  editDId = docId; pendingVId = d.vehicleId;
  document.getElementById('d-name').value = d.name;
  document.getElementById('d-url').value = (d.driveUrl && d.driveUrl !== 'null') ? d.driveUrl : '';
  document.getElementById('md-title').textContent = '✏️ 解説書を編集する';
  document.getElementById('btn-del-d').style.display = 'block';
  showM('md');
}

async function saveDoc() {
  const name     = document.getElementById('d-name').value.trim();
  const driveUrl = document.getElementById('d-url').value.trim();
  if (!name) { showToast('解説書名を入力してください'); return; }
  showToast('保存中…');
  try {
    if (editDId) {
      await api('updateDoc', { id: editDId, name, driveUrl });
      const d = docs.find(d => d.id === editDId);
      if (d) { d.name = name; d.driveUrl = driveUrl; }
      showToast('✅ 更新しました');
    } else {
      const r = await api('addDoc', { vehicleId: pendingVId, name, driveUrl });
      docs.push({ id: r.id, vehicleId: pendingVId, name, driveUrl });
      showToast('✅ 解説書を追加しました');
    }
    render(); closeM('md');
  } catch(e) { showToast('エラー: ' + e.message); }
}

async function deleteDoc() {
  if (!confirm('この解説書を削除しますか？')) return;
  try {
    await api('deleteDoc', { id: editDId });
    docs = docs.filter(d => d.id !== editDId);
    render(); closeM('md'); showToast('🗑 削除しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

function showM(id) { document.getElementById(id).classList.add('show'); }
function closeM(id) { document.getElementById(id).classList.remove('show'); }
function bgClose(e, id) { if (e.target.id === id) closeM(id); }

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
